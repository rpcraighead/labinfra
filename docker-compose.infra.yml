# Agent Swarm - Phase 1: Shared Infrastructure
# RabbitMQ (message broker), Redis (cache), Postgres (audit DB), Gatekeeper (N8N)
#
# Usage:
#   docker compose -f docker-compose.infra.yml up -d

services:
  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: rabbitmq-broker
    environment:
      RABBITMQ_DEFAULT_USER: intent-broker
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-changeme}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - swarm-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: redis-cache
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - swarm-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  postgres:
    image: postgres:15-alpine
    container_name: postgres-auditdb
    environment:
      POSTGRES_USER: auditlog
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: swarm_audit
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-audit-schema.sql:/docker-entrypoint-initdb.d/01-audit-schema.sql
    networks:
      - swarm-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auditlog -d swarm_audit"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  gatekeeper:
    image: n8nio/n8n:latest
    container_name: gatekeeper-proxy
    environment:
      N8N_SECURE_COOKIE: "false"
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:-changeme}
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: swarm_audit
      DB_POSTGRESDB_USER: auditlog
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      N8N_LISTEN_ADDRESS: 0.0.0.0
      N8N_PORT: 5678
      GATEKEEPER_URL: http://gatekeeper:5678
      NOTIFY_EMAIL: ${NOTIFY_EMAIL:-}
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
      - ./gatekeeper-workflows:/home/node/.n8n/workflows:ro
    networks:
      - swarm-net
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5678/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  rabbitmq_data:
  redis_data:
  postgres_data:
  n8n_data:

networks:
  swarm-net:
    driver: bridge
    name: agent-swarm_swarm-net
